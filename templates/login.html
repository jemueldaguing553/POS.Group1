<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.login-box {
    background: #ffffff;
    padding: 40px 30px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ddd;
    margin-bottom: 15px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 20px;
    background: #4a90e2;
    color: white;
    cursor: pointer;
}

#error {
    color: red;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="text" id="userID" placeholder="Enter User ID" onkeypress="handleEnter(event)">

    <button onclick="login()">Login</button>

    <p id="error"></p>
</div>

<script>

// ✅ If already logged in, skip login
if (localStorage.getItem("loggedIn") === "true") {
    window.location.href = "pos.html";
}

const validUserID = "1001";

function login() {
    let input = document.getElementById("userID").value.trim();
    let error = document.getElementById("error");

    error.textContent = ""; // clear previous error

    if (input === "") {
        error.textContent = "Please enter User ID!";
        return;
    }

    if (input === validUserID) {
        localStorage.setItem("loggedIn", "true");

        window.location.href = "pos.html";
    } else {
        error.textContent = "Invalid User ID!";
    }
}

// ✅ Press ENTER to login
function handleEnter(e) {
    if (e.key === "Enter") {
        login();
    }
}

</script>

</body>
</html>
