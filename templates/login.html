<!DOCTYPE html>
</body>
</html>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.login-box {
    background: #ffffff;
    padding: 40px 30px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.login-box h2 {
    margin-bottom: 25px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ddd;
    outline: none;
    font-size: 14px;
    margin-bottom: 15px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 20px;
    background: #4a90e2;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #357bd8;
}

#error {
    color: red;
    font-size: 13px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="text" id="userID" placeholder="Enter User ID">

    <button onclick="login()">Login</button>

    <p id="error"></p>
</div>

<script>
const validUserID = "1001";

function login() {
    let input = document.getElementById("userID").value.trim();

    if (input === validUserID) {
        localStorage.setItem("loggedIn", "true");

        window.location.href = "pos.html"; 
    } else {
        document.getElementById("error").textContent = "Invalid User ID!";
    }
}
</script>

</body>
</html>
